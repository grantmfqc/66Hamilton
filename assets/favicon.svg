<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;display=swap');
      .text {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 260px;
        fill: #C9A96E;
        letter-spacing: -5px;
      }
    </style>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C28A" />
      <stop offset="50%" stop-color="#C9A96E" />
      <stop offset="100%" stop-color="#A68346" />
    </linearGradient>
  </defs>
  <!-- Background with slight border -->
  <rect width="512" height="512" rx="120" fill="#0B0B0D" />
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#C9A96E" stroke-width="8" stroke-opacity="0.3" />
  <!-- 66 Text -->
  <text x="50%" y="54%" class="text" fill="url(#gold)" text-anchor="middle" dominant-baseline="middle">66</text>
</svg>
