<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&amp;family=Outfit:wght@500&amp;display=swap');
      .text-p {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-style: italic;
        font-size: 260px;
        fill: url(#gold);
      }
      .text-s {
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        font-size: 200px;
        fill: #F2EFE9;
      }
    </style>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C28A" />
      <stop offset="50%" stop-color="#C9A96E" />
      <stop offset="100%" stop-color="#A68346" />
    </linearGradient>
  </defs>

  <!-- Background with slight border -->
  <rect width="512" height="512" rx="120" fill="#0B0B0D" />
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="#C9A96E" stroke-width="4" stroke-opacity="0.4" />
  <rect x="36" y="36" width="440" height="440" rx="84" fill="none" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.2" />

  <!-- Monogram PS -->
  <text x="36%" y="58%" class="text-p" text-anchor="middle" dominant-baseline="middle">P</text>
  <text x="64%" y="54%" class="text-s" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>
